   <!DOCTYPE html>
<html>
    <head>
        <meta charset ="UTF-8">
        <title> QUICK NOTE TAKER </title>
        <style>
            body {
                font-family: system-ui;
                padding: 20px;
                background: #6823c9;

            }
            textarea{
                width: 95%;
                height:60vh;
                font-size: 18px;
                padding :15px;
                
            }
            button {
                padding: 12px  30px ;
                font-size: 18px;
                background: #594175;
                color: rgb(255, 247, 247);
                border: none;
                cursor:pointer;
            }

            .celebration {
                position: fixed;
                top: 15%;
                left: 50%;
                transform: translateX(-50%) scale(0.8);
                background: rgba(255, 255, 255, 0.95);
                border: 2px solid #ffcd3c;
                border-radius: 12px;
                padding: 16px 24px;
                font-size: 20px;
                color: #c05959;
                z-index: 9999;
                opacity: 0;
                pointer-events: none;
                animation: pop 0.5s ease forwards;
            }

            .celebration.show {
                opacity: 1;
                transform: translateX(-50%) scale(1);
                animation: pop 0.5s ease forwards;
            }
        </style>
    </head>
    <body>
        <h1>  QuickNote Taker   </h1>
        <textarea id="note" placeholder="Start typing your note ..."></textarea>
        <br><br>
        <button id="new-note">🆕 New Note</button>
        <button id="open-file">📂 Open File</button>
        <button id="save">💾 Save Note</button>
        <button id="save-as">🗃️ Save As</button>
        <p id="save_status" style="color: gray; font-size: 14px;"></p>
        <div id="starContainer"></div>
        <div id="celebration" class="celebration" aria-live="assertive" role="status"></div>
        <script src="renderer.js"></script>
    </body>
</html>
